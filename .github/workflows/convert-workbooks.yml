name: Convert Workbooks to HTML

on:
  push:
    branches: [main]
    paths:
      - "workbooks/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Convert xlsx files to HTML
        run: python order_guide_to_html.py

      - name: Commit generated HTML files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add workbook_html/
          git diff --cached --quiet || git commit -m "chore: convert workbooks to HTML [skip ci]"
          git push
